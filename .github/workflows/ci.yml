# ============================================================
# AUTOMATION: CI
# WHAT IT DOES: Lints SQL, validates naming, builds + tests all models
# WHAT IT MODIFIES: Creates/refreshes per-PR CI BQ datasets (analytics_ci_{pr_number}_*)
# AUTO-COMMITS: No
# HOW TO DISABLE: Delete this file
# ============================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: SQLFluff lint
        run: sqlfluff lint models/ --templater jinja

      - name: Lint model names
        run: scripts/lint-model-names.sh

      - name: Lint doc blocks
        run: bash scripts/lint-doc-blocks.sh --strict

  build-and-validate:
    name: Build & Validate
    needs: lint
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      PR_NUMBER: ${{ github.event.pull_request.number || github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt

      - name: Install dbt
        run: pip install dbt-core dbt-bigquery

      - name: Cache dbt packages
        uses: actions/cache@v4
        with:
          path: dbt_packages
          key: dbt-packages-${{ hashFiles('packages.yml') }}

      - name: Install dbt packages
        run: dbt deps

      - name: Authenticate to GCP (OIDC/WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up dbt profile
        run: |
          mkdir -p ~/.dbt
          cp profiles.yml.example ~/.dbt/profiles.yml

      - name: Check source freshness
        run: dbt source freshness --target ci
        continue-on-error: true  # synthetic data is always stale; documents pattern without blocking CI

      - name: Build staging layer
        run: dbt build --select models/staging/ --exclude test_type:singular --target ci --full-refresh

      - name: Build all models and run tests
        run: dbt build --target ci --full-refresh

      - name: Run dbt-project-evaluator
        run: dbt build --select package:dbt_project_evaluator --target ci

      - name: Upload manifest (push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dbt-manifest
          path: target/manifest.json
          retention-days: 90

      # Non-PR runs use run_id as dataset namespace — clean up after ourselves
      # since pr-teardown.yml only fires on pull_request closed events.
      - name: Set up Cloud SDK
        if: always() && github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@v2

      - name: Drop ephemeral CI datasets
        if: always() && github.event_name != 'pull_request'
        run: |
          for dataset in \
            "analytics_ci_${PR_NUMBER}" \
            "analytics_ci_${PR_NUMBER}_staging" \
            "analytics_ci_${PR_NUMBER}_intermediate" \
            "analytics_ci_${PR_NUMBER}_marts"; do
            bq rm -r -f --project_id="${GCP_PROJECT_ID}" "${dataset}" || true
          done
