version: 2

seeds:
  - name: dim_date
    description: '{{ doc("dim_date") }}'
    config:
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: date_key
        description: '{{ doc("col_date_key") }}'
        tests:
          - unique
          - not_null

      - name: date_day
        description: '{{ doc("col_date_day") }}'
        tests:
          - unique
          - not_null

      - name: day_of_week
        description: '{{ doc("col_day_of_week") }}'
        tests:
          - not_null

      - name: day_name
        description: '{{ doc("col_day_name") }}'
        tests:
          - not_null

      - name: day_of_month
        description: '{{ doc("col_day_of_month") }}'
        tests:
          - not_null

      - name: day_of_year
        description: '{{ doc("col_day_of_year") }}'
        tests:
          - not_null

      - name: week_start_date
        description: '{{ doc("col_week_start_date") }}'
        tests:
          - not_null

      - name: month_start_date
        description: '{{ doc("col_month_start_date") }}'
        tests:
          - not_null

      - name: month_name
        description: '{{ doc("col_month_name") }}'
        tests:
          - not_null

      - name: month_number
        description: '{{ doc("col_month_number") }}'
        tests:
          - not_null

      - name: quarter_number
        description: '{{ doc("col_quarter_number") }}'
        tests:
          - not_null

      - name: quarter_start_date
        description: '{{ doc("col_quarter_start_date") }}'
        tests:
          - not_null

      - name: year_number
        description: '{{ doc("col_year_number") }}'
        tests:
          - not_null

      - name: is_weekend
        description: '{{ doc("col_is_weekend") }}'
        tests:
          - not_null

  - name: experiment_metadata
    description: Experiment definitions for the experiment dimension.
    config:
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 2
    columns:
      - name: experiment_id
        description: '{{ doc("col_experiment_id") }}'
        tests:
          - unique
          - not_null

      - name: experiment_name
        description: '{{ doc("col_experiment_name") }}'
        tests:
          - not_null

      - name: status
        description: '{{ doc("col_experiment_status") }}'
        tests:
          - not_null

      - name: start_date
        description: '{{ doc("col_experiment_start_date") }}'
        tests:
          - not_null

      - name: end_date
        description: '{{ doc("col_experiment_end_date") }}'

      - name: description
        description: '{{ doc("col_experiment_description") }}'
