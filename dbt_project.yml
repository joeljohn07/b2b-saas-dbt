name: b2b_saas_dbt
version: '0.1.0'
config-version: 2
require-dbt-version: [">=1.11.0", "<1.12.0"]

profile: b2b_saas_dbt

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
docs-paths: ["docs", "models"]
asset-paths: ["assets"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # dbt-project-evaluator: naming convention overrides
  model_types: ['staging', 'intermediate', 'marts', 'other']
  marts_prefixes: ['fct_', 'dim_', 'bridge_']
  other_prefixes: ['agg_', 'rpt_', 'mart_']

models:
  b2b_saas_dbt:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

  dbt_project_evaluator:
    +severity: warn
    marts:
      dag:
        fct_staging_dependent_on_staging:
          +severity: error
        fct_staging_dependent_on_source:
          +severity: error
        fct_marts_or_intermediate_dependent_on_source:
          +severity: error
        fct_direct_join_to_source:
          +severity: error
        fct_source_fanout:
          +severity: warn
        fct_model_fanout:
          +severity: warn
      structure:
        fct_model_naming_conventions:
          +severity: error
        fct_test_coverage:
          +severity: warn
        fct_documentation_coverage:
          +severity: warn
      governance:
        fct_public_models_without_contract:
          +enabled: false
        fct_undocumented_public_models:
          +enabled: false
        fct_exposures_dependent_on_private_models:
          +enabled: false
