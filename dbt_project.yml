name: b2b_saas_dbt
version: '0.1.0'
config-version: 2
require-dbt-version: [">=1.11.0", "<1.12.0"]

profile: b2b_saas_dbt

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
docs-paths: ["docs", "models"]
asset-paths: ["assets"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # dbt-project-evaluator: naming convention overrides
  model_types: ['staging', 'intermediate', 'marts', 'other']
  marts_prefixes: ['fct_', 'dim_', 'bridge_']
  other_prefixes: ['agg_', 'rpt_', 'mart_']

models:
  b2b_saas_dbt:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
