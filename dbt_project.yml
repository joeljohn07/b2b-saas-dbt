name: b2b_saas_dbt
version: '0.1.0'
config-version: 2
require-dbt-version: [">=1.11.0", "<1.12.0"]

profile: b2b_saas_dbt

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
docs-paths: ["docs", "models"]
asset-paths: ["assets"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # dbt-project-evaluator: naming convention overrides
  model_types: ['staging', 'intermediate', 'marts', 'other']
  marts_prefixes: ['fct_', 'dim_', 'bridge_']
  other_prefixes: ['agg_', 'rpt_', 'mart_']

  # Locked business rule constants — change requires decisions.md entry
  session_timeout_seconds: 1800        # 30-min inactivity threshold (PR #35)
  attribution_lookback_days: 30        # pre-activation attribution window (PR #35)
  account_health_trailing_days: 28     # trailing window for health score calculation
  engagement_active_threshold_days: 14  # days since activity = active state
  engagement_dormant_threshold_days: 42 # days since activity = dormant state
  events_incremental_lookback_hours: 36  # late-arrival dedup window for int_events_normalized
  identity_stitching_lookback_days: 90   # bounded anon→user stitch window for int_identity_stitched
  checkout_conversion_window_days: 30    # checkout → subscription conversion window
  retention_maturity_guard_days: 7       # cohort period must be this old to be reported
  project_start_date: '2024-01-01'       # sentinel for users with no recorded activity

  # Reconciliation window for the staging→intermediate dedup rate check.
  # Distinct from the model's incremental lookback (late-arrival dedup): this
  # is only the slice of history the CI reconciliation test scans.
  reconciliation_dedup_test_window_days: 30

seeds:
  b2b_saas_dbt:
    +persist_docs:
      relation: true
      columns: true
    +schema: marts
    dim_date:
      +column_types:
        date_key: int64
        date_day: date
        week_start_date: date
        month_start_date: date
        quarter_start_date: date
    experiment_metadata:
      +column_types:
        start_date: date
        end_date: date
    fixtures:
      +schema: fixtures
      +tags: ['fixture']
      +column_types:
        event_time: timestamp
        ingest_time: timestamp
        _loaded_at: timestamp
        event_date: date
        time_to_activate_hours: float64
        feature_duration_seconds: int64

models:
  b2b_saas_dbt:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

  dbt_project_evaluator:
    +severity: warn
    marts:
      dag:
        fct_staging_dependent_on_staging:
          +severity: error
        fct_staging_dependent_on_source:
          +severity: error
        fct_marts_or_intermediate_dependent_on_source:
          +severity: error
        fct_direct_join_to_source:
          +severity: error
        fct_source_fanout:
          +severity: warn
        fct_model_fanout:
          +severity: warn
      structure:
        fct_model_naming_conventions:
          +severity: error
        fct_test_coverage:
          +severity: warn
        fct_documentation_coverage:
          +severity: warn
      governance:
        fct_public_models_without_contract:
          +enabled: false  # disabled: all public models use access:protected; no public access configured yet
        fct_undocumented_public_models:
          +enabled: false  # disabled: same reason as above — no public access layer
        fct_exposures_dependent_on_private_models:
          +enabled: false  # disabled: no public access layer configured yet
