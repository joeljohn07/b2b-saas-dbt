name: analytics_dbt
version: '0.1.0'
config-version: 2
require-dbt-version: [">=1.11.0", "<1.12.0"]

profile: analytics_dbt

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
docs-paths: ["docs"]
asset-paths: ["assets"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  source_dataset_prefix: "raw"

models:
  analytics_dbt:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
