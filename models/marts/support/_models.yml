version: 2

models:
  - name: fct_support_tickets
    description: '{{ doc("fct_support_tickets") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 3
    columns:
      - name: ticket_key
        data_type: int64
        description: '{{ doc("col_ticket_key") }}'
        meta:
          dimension:
            hidden: true
          metrics:
            tickets:
              type: count_distinct
              label: "Tickets"
              description: 'Distinct support tickets.'
        data_tests:
          - unique
          - not_null

      - name: ticket_id
        data_type: string
        description: '{{ doc("col_ticket_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - unique
          - not_null

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null

      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: account_id
        data_type: string
        description: '{{ doc("col_account_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null

      - name: account_key
        data_type: int64
        description: '{{ doc("col_account_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_accounts')
                field: account_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: created_date_key
        data_type: int64
        description: '{{ doc("col_created_date_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: created_at
        data_type: timestamp
        description: '{{ doc("col_created_at") }}'
        meta:
          dimension:
            type: timestamp
            time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]
        data_tests:
          - not_null

      - name: resolved_at
        data_type: timestamp
        description: '{{ doc("col_resolved_at") }}'
        meta:
          dimension:
            type: timestamp
            time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]

      - name: category
        data_type: string
        description: '{{ doc("col_category") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - billing
                  - bug
                  - feature_request
                  - onboarding
                  - other

      - name: priority
        data_type: string
        description: '{{ doc("col_priority") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - critical
                  - high
                  - medium
                  - low

      - name: status
        data_type: string
        description: '{{ doc("col_ticket_status") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - closed
                  - in_progress
                  - open
                  - resolved

      - name: csat_score
        data_type: int64
        description: '{{ doc("col_csat_score") }}'
        meta:
          dimension:
            type: number
          metrics:
            avg_csat:
              type: average
              label: "Avg CSAT"
              description: 'Mean customer-satisfaction score (1–5). Null responses excluded.'

      - name: resolution_time_hours
        data_type: float64
        description: '{{ doc("col_resolution_time_hours") }}'
        meta:
          dimension:
            type: number
          metrics:
            avg_resolution_time_hours:
              type: average
              label: "Avg Resolution Time (h)"
              description: 'Mean ticket resolution time in hours. Includes only resolved tickets.'

      - name: first_response_hours
        data_type: float64
        description: '{{ doc("col_first_response_hours") }}'
        meta:
          dimension:
            type: number

      - name: is_resolved
        data_type: boolean
        description: '{{ doc("col_is_resolved") }}'
        meta:
          dimension:
            type: boolean
        data_tests:
          - not_null
