version: 2

models:
  - name: fct_marketing_spend
    description: '{{ doc("fct_marketing_spend") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 2
    columns:
      - name: spend_key
        data_type: int64
        description: '{{ doc("col_spend_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - unique
          - not_null

      - name: spend_id
        data_type: string
        description: '{{ doc("col_spend_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - unique
          - not_null

      - name: spend_date_key
        data_type: int64
        description: '{{ doc("col_spend_date_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: channel
        data_type: string
        description: '{{ doc("col_channel") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null

      - name: channel_key
        data_type: int64
        description: '{{ doc("col_channel_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: campaign_id
        data_type: string
        description: '{{ doc("col_campaign_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null

      - name: campaign_name
        data_type: string
        description: '{{ doc("col_campaign_name") }}'
        meta:
          dimension:
            type: string

      - name: spend_amount
        data_type: numeric
        description: '{{ doc("col_spend_amount") }}'
        meta:
          dimension:
            type: number
          metric:
            type: sum
            label: "Marketing Spend"
            description: 'Sum of marketing spend.'
        data_tests:
          - not_null

      - name: currency
        data_type: string
        description: '{{ doc("col_currency") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null

      - name: impressions
        data_type: int64
        description: '{{ doc("col_impressions") }}'
        meta:
          dimension:
            type: number
          metric:
            type: sum
            label: "Impressions"
            description: 'Sum of ad impressions.'

      - name: clicks
        data_type: int64
        description: '{{ doc("col_clicks") }}'
        meta:
          dimension:
            type: number
          metric:
            type: sum
            label: "Clicks"
            description: 'Sum of ad clicks.'
