version: 2

models:
  - name: fct_subscriptions
    description: '{{ doc("fct_subscriptions") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: subscription_event_key
        data_type: int64
        description: '{{ doc("col_subscription_event_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - unique
          - not_null

      - name: subscription_event_id
        data_type: string
        description: '{{ doc("col_subscription_event_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - unique
          - not_null

      - name: subscription_id
        data_type: string
        description: '{{ doc("col_subscription_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null

      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: account_id
        data_type: string
        description: '{{ doc("col_account_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null

      - name: account_key
        data_type: int64
        description: '{{ doc("col_account_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_accounts')
                field: account_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: event_date_key
        data_type: int64
        description: '{{ doc("col_event_date_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: event_time
        data_type: timestamp
        description: '{{ doc("col_event_time") }}'
        meta:
          dimension:
            type: timestamp
            time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]
        data_tests:
          - not_null

      - name: event_type
        data_type: string
        description: '{{ doc("col_event_type") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - cancellation
                  - downgrade
                  - reactivation
                  - renewal
                  - subscription_start
                  - trial_end
                  - trial_start
                  - upgrade

      - name: plan
        data_type: string
        description: '{{ doc("col_plan") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - enterprise
                  - free
                  - pro
                  - starter

      - name: previous_plan
        data_type: string
        description: '{{ doc("col_previous_plan") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - free
                  - starter
                  - pro
                  - enterprise
              config:
                where: "previous_plan is not null"

      - name: billing_cycle
        data_type: string
        description: '{{ doc("col_billing_cycle") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - annual
                  - monthly

      - name: mrr_amount
        data_type: numeric
        description: '{{ doc("col_mrr_amount") }}'
        meta:
          dimension:
            type: number
          metric:
            type: sum
            label: "Subscription MRR"
            description: 'Sum of MRR amounts at subscription event time.'
        data_tests:
          - not_null

      - name: currency
        data_type: string
        description: '{{ doc("col_currency") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - EUR
                  - USD

      - name: cancel_reason
        data_type: string
        description: '{{ doc("col_cancel_reason") }}'
        meta:
          dimension:
            type: string

      - name: is_voluntary
        data_type: boolean
        description: '{{ doc("col_is_voluntary") }}'
        meta:
          dimension:
            type: boolean

      - name: is_active
        data_type: boolean
        description: '{{ doc("col_is_active") }}'
        meta:
          dimension:
            type: boolean
        data_tests:
          - not_null

      - name: days_since_previous_event
        data_type: int64
        description: '{{ doc("col_days_since_previous_event") }}'
        meta:
          dimension:
            type: number

  - name: fct_mrr_movements
    description: '{{ doc("fct_mrr_movements") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: mrr_movement_key
        data_type: int64
        description: '{{ doc("col_mrr_movement_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - unique
          - not_null

      - name: account_id
        data_type: string
        description: '{{ doc("col_account_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null

      - name: account_key
        data_type: int64
        description: '{{ doc("col_account_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_accounts')
                field: account_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: subscription_event_id
        data_type: string
        description: '{{ doc("col_subscription_event_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null

      - name: subscription_id
        data_type: string
        description: '{{ doc("col_subscription_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null

      - name: movement_date_key
        data_type: int64
        description: '{{ doc("col_movement_date_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: movement_date
        data_type: date
        description: '{{ doc("col_movement_date") }}'
        meta:
          dimension:
            type: date
            time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]
        data_tests:
          - not_null

      - name: movement_type
        data_type: string
        description: '{{ doc("col_movement_type") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - churn
                  - contraction
                  - expansion
                  - new
                  - reactivation

      - name: mrr_before
        data_type: numeric
        description: '{{ doc("col_mrr_before") }}'
        meta:
          dimension:
            type: number
        data_tests:
          - not_null

      - name: mrr_after
        data_type: numeric
        description: '{{ doc("col_mrr_after") }}'
        meta:
          dimension:
            type: number
        data_tests:
          - not_null

      - name: mrr_delta
        data_type: numeric
        description: '{{ doc("col_mrr_delta") }}'
        meta:
          dimension:
            type: number
          metric:
            type: sum
            label: "Net MRR"
            description: 'Cumulative sum of MRR movements. Decomposes into new / expansion / contraction / churn / reactivation via the movement_type dimension.'
        data_tests:
          - not_null

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - account_id
              - subscription_event_id

  - name: fct_invoices
    description: '{{ doc("fct_invoices") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: invoice_key
        data_type: int64
        description: '{{ doc("col_invoice_key") }}'
        meta:
          dimension:
            hidden: true
          metric:
            type: count_distinct
            label: "Invoices"
            description: 'Distinct invoices issued.'
        data_tests:
          - unique
          - not_null

      - name: invoice_id
        data_type: string
        description: '{{ doc("col_invoice_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - unique
          - not_null

      - name: subscription_id
        data_type: string
        description: '{{ doc("col_subscription_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null

      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: account_id
        data_type: string
        description: '{{ doc("col_account_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null

      - name: account_key
        data_type: int64
        description: '{{ doc("col_account_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_accounts')
                field: account_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: issued_date_key
        data_type: int64
        description: '{{ doc("col_issued_date_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: issued_at
        data_type: timestamp
        description: '{{ doc("col_issued_at") }}'
        meta:
          dimension:
            type: timestamp
            time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]
        data_tests:
          - not_null

      - name: paid_at
        data_type: timestamp
        description: '{{ doc("col_paid_at") }}'
        meta:
          dimension:
            type: timestamp
            time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]

      - name: amount
        data_type: numeric
        description: '{{ doc("col_amount") }}'
        meta:
          dimension:
            type: number
          metric:
            type: sum
            label: "Invoice Amount"
            description: 'Sum of invoice amounts billed.'
        data_tests:
          - not_null

      - name: currency
        data_type: string
        description: '{{ doc("col_currency") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - EUR
                  - USD

      - name: status
        data_type: string
        description: '{{ doc("col_invoice_status") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - failed
                  - paid
                  - pending
                  - refunded

      - name: refund_amount
        data_type: numeric
        description: '{{ doc("col_refund_amount") }}'
        meta:
          dimension:
            type: number
        data_tests:
          - not_null

      - name: net_amount
        data_type: numeric
        description: '{{ doc("col_net_amount") }}'
        meta:
          dimension:
            type: number
          metric:
            type: sum
            label: "Net Revenue"
            description: 'Sum of net amounts (amount minus refunds). Excludes refunded invoices.'
        data_tests:
          - not_null

      - name: is_paid
        data_type: boolean
        description: '{{ doc("col_is_paid") }}'
        meta:
          dimension:
            type: boolean
        data_tests:
          - not_null
