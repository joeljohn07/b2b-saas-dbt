        description: '{{ doc("col_usage_at") }}'
        meta:
          dimension:
            type: timestamp
            time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]
        data_tests:
          - not_null

      - name: feature_name
        data_type: string
        description: '{{ doc("col_feature_name") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - alert_create
                  - api_call
                  - chart_edit
                  - dashboard_view
                  - data_export
                  - filter_apply
                  - integration_setup
                  - report_create
                  - share_report
                  - template_use

      - name: feature_duration_seconds
        data_type: int64
        description: '{{ doc("col_feature_duration_seconds") }}'
        meta:
          dimension:
            type: number

      - name: platform
        data_type: string
        description: '{{ doc("col_platform") }}'
        meta:
          dimension:
            type: string

      - name: device_type
        data_type: string
        description: '{{ doc("col_device_type") }}'
        meta:
          dimension:
            type: string

  - name: fct_sessions
    description: '{{ doc("fct_sessions") }}'
    config:
