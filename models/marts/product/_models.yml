version: 2

models:
  - name: dim_sessions
    description: '{{ doc("dim_sessions") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 2
    columns:
      - name: session_key
        data_type: int64
        description: '{{ doc("col_session_key") }}'
        tests:
          - unique
          - not_null

      - name: session_id
        data_type: string
        description: '{{ doc("col_session_id") }}'
        tests:
          - unique
          - not_null

      - name: session_date_key
        data_type: int64
        description: '{{ doc("col_session_date_key") }}'
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: platform
        data_type: string
        description: '{{ doc("col_platform") }}'

      - name: device_type
        data_type: string
        description: '{{ doc("col_device_type") }}'

      - name: browser
        data_type: string
        description: '{{ doc("col_browser") }}'

      - name: utm_source
        data_type: string
        description: '{{ doc("col_utm_source") }}'

      - name: utm_medium
        data_type: string
        description: '{{ doc("col_utm_medium") }}'

      - name: utm_campaign
        data_type: string
        description: '{{ doc("col_utm_campaign") }}'

      - name: session_duration_seconds
        data_type: int64
        description: '{{ doc("col_session_duration_seconds") }}'

      - name: event_count
        data_type: int64
        description: '{{ doc("col_event_count") }}'

      - name: page_view_count
        data_type: int64
        description: '{{ doc("col_page_view_count") }}'

  - name: dim_experiments
    description: '{{ doc("dim_experiments") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 2
    columns:
      - name: experiment_key
        data_type: int64
        description: '{{ doc("col_experiment_key") }}'
        tests:
          - unique
          - not_null

      - name: experiment_id
        data_type: string
        description: '{{ doc("col_experiment_id") }}'
        tests:
          - unique
          - not_null

      - name: experiment_name
        data_type: string
        description: '{{ doc("col_experiment_name") }}'
        tests:
          - not_null

      - name: status
        data_type: string
        description: '{{ doc("col_experiment_status") }}'
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - active
                  - completed
                  - paused

      - name: start_date
        data_type: date
        description: '{{ doc("col_experiment_start_date") }}'
        tests:
          - not_null

      - name: end_date
        data_type: date
        description: '{{ doc("col_experiment_end_date") }}'

      - name: description
        data_type: string
        description: '{{ doc("col_experiment_description") }}'

  - name: bridge_user_experiments
    description: '{{ doc("bridge_user_experiments") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 2
    columns:
      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_key

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        tests:
          - not_null

      - name: experiment_key
        data_type: int64
        description: '{{ doc("col_experiment_key") }}'
        tests:
          - not_null
          - relationships:
              to: ref('dim_experiments')
              field: experiment_key

      - name: variant
        data_type: string
        description: '{{ doc("col_variant") }}'
        tests:
          - not_null

      - name: first_exposure_at
        data_type: timestamp
        description: '{{ doc("col_first_exposure_at") }}'
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - user_key
            - experiment_key

  - name: fct_feature_usage
    description: '{{ doc("fct_feature_usage") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 2
    columns:
      - name: feature_usage_key
        data_type: int64
        description: '{{ doc("col_feature_usage_key") }}'
        tests:
          - unique
          - not_null

      - name: event_id
        data_type: string
        description: '{{ doc("col_event_id") }}'
        tests:
          - unique
          - not_null

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        tests:
          - not_null

      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_key

      - name: account_id
        data_type: string
        description: '{{ doc("col_account_id") }}'

      - name: account_key
        data_type: int64
        description: '{{ doc("col_account_key") }}'
        tests:
          - relationships:
              to: ref('dim_accounts')
              field: account_key
              where: "account_key is not null"

      - name: usage_date_key
        data_type: int64
        description: '{{ doc("col_usage_date_key") }}'
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: usage_at
        data_type: timestamp
        description: '{{ doc("col_usage_at") }}'
        tests:
          - not_null

      - name: feature_name
        data_type: string
        description: '{{ doc("col_feature_name") }}'
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - alert_create
                  - api_call
                  - chart_edit
                  - dashboard_view
                  - data_export
                  - filter_apply
                  - integration_setup
                  - report_create
                  - share_report
                  - template_use

      - name: feature_duration_seconds
        data_type: int64
        description: '{{ doc("col_feature_duration_seconds") }}'

      - name: platform
        data_type: string
        description: '{{ doc("col_platform") }}'

      - name: device_type
        data_type: string
        description: '{{ doc("col_device_type") }}'

  - name: fct_sessions
    description: '{{ doc("fct_sessions") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 2
    columns:
      - name: session_key
        data_type: int64
        description: '{{ doc("col_session_key") }}'
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('dim_sessions')
              field: session_key

      - name: session_id
        data_type: string
        description: '{{ doc("col_session_id") }}'
        tests:
          - unique
          - not_null

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        tests:
          - not_null

      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_key

      - name: session_date_key
        data_type: int64
        description: '{{ doc("col_session_date_key") }}'
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: session_start_at
        data_type: timestamp
        description: '{{ doc("col_session_start_at") }}'
        tests:
          - not_null

      - name: session_end_at
        data_type: timestamp
        description: '{{ doc("col_session_end_at") }}'
        tests:
          - not_null

      - name: session_duration_seconds
        data_type: int64
        description: '{{ doc("col_session_duration_seconds") }}'
        tests:
          - not_null

      - name: event_count
        data_type: int64
        description: '{{ doc("col_event_count") }}'
        tests:
          - not_null

      - name: page_view_count
        data_type: int64
        description: '{{ doc("col_page_view_count") }}'

      - name: platform
        data_type: string
        description: '{{ doc("col_platform") }}'

      - name: device_type
        data_type: string
        description: '{{ doc("col_device_type") }}'

      - name: browser
        data_type: string
        description: '{{ doc("col_browser") }}'

      - name: utm_source
        data_type: string
        description: '{{ doc("col_utm_source") }}'

      - name: utm_medium
        data_type: string
        description: '{{ doc("col_utm_medium") }}'

      - name: utm_campaign
        data_type: string
        description: '{{ doc("col_utm_campaign") }}'

  - name: fct_experiment_exposures
    description: '{{ doc("fct_experiment_exposures") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 2
    columns:
      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        tests:
          - not_null

      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_key

      - name: experiment_id
        data_type: string
        description: '{{ doc("col_experiment_id") }}'
        tests:
          - not_null

      - name: experiment_key
        data_type: int64
        description: '{{ doc("col_experiment_key") }}'
        tests:
          - not_null
          - relationships:
              to: ref('dim_experiments')
              field: experiment_key

      - name: variant
        data_type: string
        description: '{{ doc("col_variant") }}'
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - control
                  - treatment

      - name: first_exposure_at
        data_type: timestamp
        description: '{{ doc("col_first_exposure_at") }}'
        tests:
          - not_null

      - name: exposure_date_key
        data_type: int64
        description: '{{ doc("col_exposure_date_key") }}'
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: converted
        data_type: boolean
        description: '{{ doc("col_converted") }}'
        tests:
          - not_null

      - name: conversion_at
        data_type: timestamp
        description: '{{ doc("col_conversion_at") }}'

      - name: exposure_duration_hours
        data_type: int64
        description: '{{ doc("col_exposure_duration_hours") }}'
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - user_key
            - experiment_key
