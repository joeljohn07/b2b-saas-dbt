          - not_null

      - name: event_count
        data_type: int64
        description: '{{ doc("col_event_count") }}'
        meta:
          dimension:
            type: number
          metric:
            type: sum
            label: "Events"
            description: 'Sum of events across sessions.'
        data_tests:
          - not_null

      - name: page_view_count
        data_type: int64
        description: '{{ doc("col_page_view_count") }}'
        meta:
          dimension:
