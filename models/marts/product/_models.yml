version: 2

models:
  - name: dim_sessions
    description: '{{ doc("dim_sessions") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 2
    columns:
      - name: session_key
        data_type: int64
        description: '{{ doc("col_session_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - unique
          - not_null

      - name: session_id
        data_type: string
        description: '{{ doc("col_session_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - unique
          - not_null

      - name: session_date_key
        data_type: int64
        description: '{{ doc("col_session_date_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: platform
        data_type: string
        description: '{{ doc("col_platform") }}'
        meta:
          dimension:
            type: string

      - name: device_type
        data_type: string
        description: '{{ doc("col_device_type") }}'
        meta:
          dimension:
            type: string

      - name: browser
        data_type: string
        description: '{{ doc("col_browser") }}'
        meta:
          dimension:
            type: string

      - name: utm_source
        data_type: string
        description: '{{ doc("col_utm_source") }}'
        meta:
          dimension:
            type: string

      - name: utm_medium
        data_type: string
        description: '{{ doc("col_utm_medium") }}'
        meta:
          dimension:
            type: string

      - name: utm_campaign
        data_type: string
        description: '{{ doc("col_utm_campaign") }}'
        meta:
          dimension:
            type: string

      - name: session_duration_seconds
        data_type: int64
        description: '{{ doc("col_session_duration_seconds") }}'
        meta:
          dimension:
            type: number

      - name: event_count
        data_type: int64
        description: '{{ doc("col_event_count") }}'
        meta:
          dimension:
            type: number

      - name: page_view_count
        data_type: int64
        description: '{{ doc("col_page_view_count") }}'
        meta:
          dimension:
            type: number

  - name: dim_experiments
    description: '{{ doc("dim_experiments") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 2
    columns:
      - name: experiment_key
        data_type: int64
        description: '{{ doc("col_experiment_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - unique
          - not_null

      - name: experiment_id
        data_type: string
        description: '{{ doc("col_experiment_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - unique
          - not_null

      - name: experiment_name
        data_type: string
        description: '{{ doc("col_experiment_name") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null

      - name: status
        data_type: string
        description: '{{ doc("col_experiment_status") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - active
                  - completed
                  - paused

      - name: start_date
        data_type: date
        description: '{{ doc("col_experiment_start_date") }}'
        meta:
          dimension:
            type: date
            time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]
        data_tests:
          - not_null

      - name: end_date
        data_type: date
        description: '{{ doc("col_experiment_end_date") }}'
        meta:
          dimension:
            type: date
            time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]

      - name: description
        data_type: string
        description: '{{ doc("col_experiment_description") }}'
        meta:
          dimension:
            type: string

  - name: bridge_user_experiments
    description: '{{ doc("bridge_user_experiments") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 2
    columns:
      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null

      - name: experiment_key
        data_type: int64
        description: '{{ doc("col_experiment_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_experiments')
                field: experiment_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: variant
        data_type: string
        description: '{{ doc("col_variant") }}'
        meta:
          dimension:
            type: string
        data_tests:
          - not_null

      - name: first_exposure_at
        data_type: timestamp
        description: '{{ doc("col_first_exposure_at") }}'
        meta:
          dimension:
            type: timestamp
            time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]
        data_tests:
          - not_null

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - user_key
              - experiment_key

  - name: fct_feature_usage
    description: '{{ doc("fct_feature_usage") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 2
    columns:
      - name: feature_usage_key
        data_type: int64
        description: '{{ doc("col_feature_usage_key") }}'
        meta:
          dimension:
            hidden: true
          metric:
            type: count_distinct
            label: "Feature Usages"
            description: 'Distinct feature-use events.'
        data_tests:
          - unique
          - not_null

      - name: event_id
        data_type: string
        description: '{{ doc("col_event_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - unique
          - not_null

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null

      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: account_id
        data_type: string
        description: '{{ doc("col_account_id") }}'
        meta:
          dimension:
            hidden: true

      - name: account_key
        data_type: int64
        description: '{{ doc("col_account_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_accounts')
                field: account_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"
              where: "account_key is not null"

      - name: usage_date_key
        data_type: int64
        description: '{{ doc("col_usage_date_key") }}'
        meta:
          dimension:
            hidden: true
        data_tests:
          - not_null
