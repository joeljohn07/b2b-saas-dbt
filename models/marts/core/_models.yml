version: 2

models:
  - name: dim_channels
    description: '{{ doc("dim_channels") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: channel_key
        data_type: int64
        description: '{{ doc("col_channel_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - unique
          - not_null

      - name: channel
        data_type: string
        description: '{{ doc("col_channel") }}'
        config:
          meta:
            dimension:
              type: string
        data_tests:
          - unique
          - not_null

  - name: dim_users
    description: '{{ doc("dim_users") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - unique
          - not_null

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - unique
          - not_null

      - name: account_id
        data_type: string
        description: '{{ doc("col_account_id") }}'
        config:
          meta:
            dimension:
              hidden: true

      - name: signup_at
        data_type: timestamp
        description: '{{ doc("col_signup_at") }}'
        config:
          meta:
            dimension:
              type: timestamp
              time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]

      - name: activation_at
        data_type: timestamp
        description: '{{ doc("col_activation_at") }}'
        config:
          meta:
            dimension:
              type: timestamp
              time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]

      - name: first_touch_channel_key
        data_type: int64
        description: '{{ doc("col_first_touch_channel_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"
              where: "first_touch_channel_key is not null"

      - name: last_touch_channel_key
        data_type: int64
        description: '{{ doc("col_last_touch_channel_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"
              where: "last_touch_channel_key is not null"

      - name: engagement_state
        data_type: string
        description: '{{ doc("col_engagement_state") }}'
        config:
          meta:
            dimension:
              type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - pre_active
                  - active
                  - dormant
                  - disengaged

      - name: is_re_engaged
        data_type: boolean
        description: '{{ doc("col_is_re_engaged") }}'
        config:
          meta:
            dimension:
              type: boolean
        data_tests:
          - not_null

      - name: is_product_user
        data_type: boolean
        description: '{{ doc("col_is_product_user") }}'
        config:
          meta:
            dimension:
              type: boolean
        data_tests:
          - not_null

      - name: is_billing_user
        data_type: boolean
        description: '{{ doc("col_is_billing_user") }}'
        config:
          meta:
            dimension:
              type: boolean
        data_tests:
          - not_null

      - name: is_support_user
        data_type: boolean
        description: '{{ doc("col_is_support_user") }}'
        config:
          meta:
            dimension:
              type: boolean
        data_tests:
          - not_null

  - name: dim_accounts
    description: '{{ doc("dim_accounts") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: account_key
        data_type: int64
        description: '{{ doc("col_account_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - unique
          - not_null

      - name: account_id
        data_type: string
        description: '{{ doc("col_account_id") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - unique
          - not_null

      - name: plan
        data_type: string
        description: '{{ doc("col_plan") }}'
        config:
          meta:
            dimension:
              type: string

      - name: billing_cycle
        data_type: string
        description: '{{ doc("col_billing_cycle") }}'
        config:
          meta:
            dimension:
              type: string

      - name: mrr_amount
        data_type: numeric
        description: '{{ doc("col_mrr_amount") }}'
        config:
          meta:
            dimension:
              type: number
            metrics:
              total_mrr:
                type: sum
                label: "Total MRR"
                description: 'Sum of MRR across all accounts.'

      - name: currency
        data_type: string
        description: '{{ doc("col_currency") }}'
        config:
          meta:
            dimension:
              type: string

      - name: user_count
        data_type: int64
        description: '{{ doc("col_user_count") }}'
        config:
          meta:
            dimension:
              type: number
            metrics:
              total_users:
                type: sum
                label: "Total Users"
                description: 'Sum of users across accounts.'

      - name: health_score
        data_type: float64
        description: '{{ doc("col_health_score") }}'
        config:
          meta:
            dimension:
              type: number
            metrics:
              avg_health_score:
                type: average
                label: "Avg Health Score"
                description: 'Mean account health score (0–100).'

      - name: activity_score
        data_type: float64
        description: '{{ doc("col_activity_score") }}'
        config:
          meta:
            dimension:
              type: number

      - name: billing_score
        data_type: float64
        description: '{{ doc("col_billing_score") }}'
        config:
          meta:
            dimension:
              type: number

      - name: support_score
        data_type: float64
        description: '{{ doc("col_support_score") }}'
        config:
          meta:
            dimension:
              type: number

      - name: acquisition_channel_key
        data_type: int64
        description: '{{ doc("col_acquisition_channel_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"
              where: "acquisition_channel_key is not null"

      - name: acquisition_date
        data_type: date
        description: '{{ doc("col_acquisition_date") }}'
        config:
          meta:
            dimension:
              type: date
              time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]

      - name: lifecycle_stage
        data_type: string
        description: '{{ doc("col_lifecycle_stage") }}'
        config:
          meta:
            dimension:
              type: string
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - trial
                  - active
                  - churned
                  - reactivated
                  - unknown

  - name: fct_signups
    description: '{{ doc("fct_signups") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: signup_key
        data_type: int64
        description: '{{ doc("col_signup_key") }}'
        config:
          meta:
            dimension:
              hidden: true
            metrics:
              signups:
                type: count_distinct
                label: "Signups"
                description: 'Distinct signup events.'
        data_tests:
          - unique
          - not_null

      - name: event_id
        data_type: string
        description: '{{ doc("col_event_id") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - unique
          - not_null

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - not_null

      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: signup_date_key
        data_type: int64
        description: '{{ doc("col_signup_date_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: signup_at
        data_type: timestamp
        description: '{{ doc("col_signup_at") }}'
        config:
          meta:
            dimension:
              type: timestamp
              time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]
        data_tests:
          - not_null

      - name: signup_method
        data_type: string
        description: '{{ doc("col_signup_method") }}'
        config:
          meta:
            dimension:
              type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - email
                  - github
                  - google

      - name: channel
        data_type: string
        description: '{{ doc("col_channel") }}'
        config:
          meta:
            dimension:
              type: string
        data_tests:
          - not_null

      - name: channel_key
        data_type: int64
        description: '{{ doc("col_channel_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: platform
        data_type: string
        description: '{{ doc("col_platform") }}'
        config:
          meta:
            dimension:
              type: string

      - name: device_type
        data_type: string
        description: '{{ doc("col_device_type") }}'
        config:
          meta:
            dimension:
              type: string

      - name: browser
        data_type: string
        description: '{{ doc("col_browser") }}'
        config:
          meta:
            dimension:
              type: string

      - name: utm_source
        data_type: string
        description: '{{ doc("col_utm_source") }}'
        config:
          meta:
            dimension:
              type: string

      - name: utm_medium
        data_type: string
        description: '{{ doc("col_utm_medium") }}'
        config:
          meta:
            dimension:
              type: string

      - name: utm_campaign
        data_type: string
        description: '{{ doc("col_utm_campaign") }}'
        config:
          meta:
            dimension:
              type: string

  - name: fct_activations
    description: '{{ doc("fct_activations") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: activation_key
        data_type: int64
        description: '{{ doc("col_activation_key") }}'
        config:
          meta:
            dimension:
              hidden: true
            metrics:
              activations:
                type: count_distinct
                label: "Activations"
                description: 'Distinct activation events — users who completed an activation action within the window.'
        data_tests:
          - unique
          - not_null

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          # unique is correct: int_attribution produces exactly one row per user
          # (one-activation-per-user is the business invariant). activation_key
          # uses concat(user_id, date) to distinguish the surrogate PK from
          # this FK, not to allow multiple activations per user.
          - unique
          - not_null

      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: activation_date_key
        data_type: int64
        description: '{{ doc("col_activation_date_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: activation_at
        data_type: timestamp
        description: '{{ doc("col_activation_at") }}'
        config:
          meta:
            dimension:
              type: timestamp
              time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]
        data_tests:
          - not_null

      - name: first_touch_channel_key
        data_type: int64
        description: '{{ doc("col_first_touch_channel_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: last_touch_channel_key
        data_type: int64
        description: '{{ doc("col_last_touch_channel_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: first_touch_channel
        data_type: string
        description: '{{ doc("col_first_touch_channel") }}'
        config:
          meta:
            dimension:
              type: string
        data_tests:
          - not_null

      - name: last_touch_channel
        data_type: string
        description: '{{ doc("col_last_touch_channel") }}'
        config:
          meta:
            dimension:
              type: string
        data_tests:
          - not_null

  - name: fct_retention_cohorts
    description: '{{ doc("fct_retention_cohorts") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: retention_cohort_key
        data_type: int64
        description: '{{ doc("col_retention_cohort_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - unique
          - not_null

      - name: cohort_week_start_date
        data_type: date
        description: '{{ doc("col_cohort_week_start_date") }}'
        config:
          meta:
            dimension:
              type: date
              time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]
        data_tests:
          - not_null

      - name: cohort_week_date_key
        data_type: int64
        description: '{{ doc("col_cohort_week_date_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"

      - name: retention_period
        data_type: string
        description: '{{ doc("col_retention_period") }}'
        config:
          meta:
            dimension:
              type: string
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - W1
                  - W2
                  - W3
                  - W4
                  - M2
                  - M3
                  - M6
                  - M12

      - name: period_offset_days
        data_type: int64
        description: '{{ doc("col_period_offset_days") }}'
        config:
          meta:
            dimension:
              type: number
        data_tests:
          - not_null

      - name: period_end_date
        data_type: date
        description: '{{ doc("col_period_end_date") }}'
        config:
          meta:
            dimension:
              type: date
              time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]
        data_tests:
          - not_null

      - name: period_end_date_key
        data_type: int64
        description: '{{ doc("col_period_end_date_key") }}'
        config:
          meta:
            dimension:
              hidden: true
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">10"
              where: "is_period_complete"

      - name: cohort_size
        data_type: int64
        description: '{{ doc("col_cohort_size") }}'
        config:
          meta:
            dimension:
              type: number
            metrics:
              total_cohort_size:
                type: sum
                label: "Total Cohort Size"
                description: 'Sum of users in each cohort window.'
        data_tests:
          - not_null

      - name: retained_count
        data_type: int64
        description: '{{ doc("col_retained_count") }}'
        config:
          meta:
            dimension:
              type: number
            metrics:
              total_retained_users:
                type: sum
                label: "Total Retained Users"
                description: 'Sum of users retained at each period.'
        data_tests:
          - not_null

      - name: retention_rate
        data_type: float64
        description: '{{ doc("col_retention_rate") }}'
        config:
          meta:
            dimension:
              type: number
            metrics:
              avg_retention_rate:
                type: average
                label: "Avg Retention Rate"
                description: 'Mean retention rate across cohorts. Note: cohort_size-weighted mean is preferred for executive reporting.'
        data_tests:
          - not_null

      - name: is_period_complete
        data_type: boolean
        description: '{{ doc("col_is_period_complete") }}'
        config:
          meta:
            dimension:
              type: boolean
        data_tests:
          - not_null

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - cohort_week_start_date
              - retention_period
