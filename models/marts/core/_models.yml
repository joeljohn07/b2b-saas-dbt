version: 2

models:
  - name: dim_channels
    description: '{{ doc("dim_channels") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: channel_key
        data_type: int64
        description: '{{ doc("col_channel_key") }}'
        tests:
          - unique
          - not_null

      - name: channel
        data_type: string
        description: '{{ doc("col_channel") }}'
        tests:
          - unique
          - not_null

  - name: dim_users
    description: '{{ doc("dim_users") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        tests:
          - unique
          - not_null

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        tests:
          - unique
          - not_null

      - name: account_id
        data_type: string
        description: '{{ doc("col_account_id") }}'

      - name: signup_at
        data_type: timestamp
        description: '{{ doc("col_signup_at") }}'

      - name: activation_at
        data_type: timestamp
        description: '{{ doc("col_activation_at") }}'

      - name: first_touch_channel_key
        data_type: int64
        description: '{{ doc("col_first_touch_channel_key") }}'
        tests:
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_key
              where: "first_touch_channel_key is not null"

      - name: last_touch_channel_key
        data_type: int64
        description: '{{ doc("col_last_touch_channel_key") }}'
        tests:
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_key
              where: "last_touch_channel_key is not null"

      - name: engagement_state
        data_type: string
        description: '{{ doc("col_engagement_state") }}'
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - pre_active
                  - active
                  - dormant
                  - disengaged

      - name: is_re_engaged
        data_type: boolean
        description: '{{ doc("col_is_re_engaged") }}'
        tests:
          - not_null

      - name: is_product_user
        data_type: boolean
        description: '{{ doc("col_is_product_user") }}'
        tests:
          - not_null

      - name: is_billing_user
        data_type: boolean
        description: '{{ doc("col_is_billing_user") }}'
        tests:
          - not_null

      - name: is_support_user
        data_type: boolean
        description: '{{ doc("col_is_support_user") }}'
        tests:
          - not_null

  - name: dim_accounts
    description: '{{ doc("dim_accounts") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: account_key
        data_type: int64
        description: '{{ doc("col_account_key") }}'
        tests:
          - unique
          - not_null

      - name: account_id
        data_type: string
        description: '{{ doc("col_account_id") }}'
        tests:
          - unique
          - not_null

      - name: plan
        data_type: string
        description: '{{ doc("col_plan") }}'

      - name: billing_cycle
        data_type: string
        description: '{{ doc("col_billing_cycle") }}'

      - name: mrr_amount
        data_type: numeric
        description: '{{ doc("col_mrr_amount") }}'

      - name: currency
        data_type: string
        description: '{{ doc("col_currency") }}'

      - name: user_count
        data_type: int64
        description: '{{ doc("col_user_count") }}'

      - name: health_score
        data_type: float64
        description: '{{ doc("col_health_score") }}'

      - name: activity_score
        data_type: float64
        description: '{{ doc("col_activity_score") }}'

      - name: billing_score
        data_type: float64
        description: '{{ doc("col_billing_score") }}'

      - name: support_score
        data_type: float64
        description: '{{ doc("col_support_score") }}'

      - name: acquisition_channel_key
        data_type: int64
        description: '{{ doc("col_acquisition_channel_key") }}'
        tests:
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_key
              where: "acquisition_channel_key is not null"

      - name: acquisition_date
        data_type: date
        description: '{{ doc("col_acquisition_date") }}'

      - name: lifecycle_stage
        data_type: string
        description: '{{ doc("col_lifecycle_stage") }}'
        tests:
          - accepted_values:
              arguments:
                values:
                  - trial
                  - active
                  - churned
                  - reactivated
                  - unknown

  - name: fct_signups
    description: '{{ doc("fct_signups") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: signup_key
        data_type: int64
        description: '{{ doc("col_signup_key") }}'
        tests:
          - unique
          - not_null

      - name: event_id
        data_type: string
        description: '{{ doc("col_event_id") }}'
        tests:
          - unique
          - not_null

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        tests:
          - not_null

      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_key

      - name: signup_date_key
        data_type: int64
        description: '{{ doc("col_signup_date_key") }}'
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: signup_at
        data_type: timestamp
        description: '{{ doc("col_signup_at") }}'
        tests:
          - not_null

      - name: signup_method
        data_type: string
        description: '{{ doc("col_signup_method") }}'
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - email
                  - github
                  - google

      - name: channel
        data_type: string
        description: '{{ doc("col_channel") }}'
        tests:
          - not_null

      - name: channel_key
        data_type: int64
        description: '{{ doc("col_channel_key") }}'
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_key

      - name: platform
        data_type: string
        description: '{{ doc("col_platform") }}'

      - name: device_type
        data_type: string
        description: '{{ doc("col_device_type") }}'

      - name: browser
        data_type: string
        description: '{{ doc("col_browser") }}'

      - name: utm_source
        data_type: string
        description: '{{ doc("col_utm_source") }}'

      - name: utm_medium
        data_type: string
        description: '{{ doc("col_utm_medium") }}'

      - name: utm_campaign
        data_type: string
        description: '{{ doc("col_utm_campaign") }}'

  - name: fct_activations
    description: '{{ doc("fct_activations") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: activation_key
        data_type: int64
        description: '{{ doc("col_activation_key") }}'
        tests:
          - unique
          - not_null

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        tests:
          # unique is correct: int_attribution produces exactly one row per user
          # (one-activation-per-user is the business invariant). activation_key
          # uses concat(user_id, date) to distinguish the surrogate PK from
          # this FK, not to allow multiple activations per user.
          - unique
          - not_null

      - name: user_key
        data_type: int64
        description: '{{ doc("col_user_key") }}'
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_key

      - name: activation_date_key
        data_type: int64
        description: '{{ doc("col_activation_date_key") }}'
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: activation_at
        data_type: timestamp
        description: '{{ doc("col_activation_at") }}'
        tests:
          - not_null

      - name: first_touch_channel_key
        data_type: int64
        description: '{{ doc("col_first_touch_channel_key") }}'
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_key

      - name: last_touch_channel_key
        data_type: int64
        description: '{{ doc("col_last_touch_channel_key") }}'
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_key

      - name: first_touch_channel
        data_type: string
        description: '{{ doc("col_first_touch_channel") }}'
        tests:
          - not_null

      - name: last_touch_channel
        data_type: string
        description: '{{ doc("col_last_touch_channel") }}'
        tests:
          - not_null

  - name: fct_retention_cohorts
    description: '{{ doc("fct_retention_cohorts") }}'
    config:
      contract:
        enforced: true
      tags:
        - marts
      meta:
        owner: analytics
        pii: false
        sla: daily
        tier: 1
    columns:
      - name: retention_cohort_key
        data_type: int64
        description: '{{ doc("col_retention_cohort_key") }}'
        tests:
          - unique
          - not_null

      - name: cohort_week_start_date
        data_type: date
        description: '{{ doc("col_cohort_week_start_date") }}'
        tests:
          - not_null

      - name: cohort_week_date_key
        data_type: int64
        description: '{{ doc("col_cohort_week_date_key") }}'
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: retention_period
        data_type: string
        description: '{{ doc("col_retention_period") }}'
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - W1
                  - W2
                  - W3
                  - W4
                  - M2
                  - M3
                  - M6
                  - M12

      - name: period_offset_days
        data_type: int64
        description: '{{ doc("col_period_offset_days") }}'
        tests:
          - not_null

      - name: period_end_date
        data_type: date
        description: '{{ doc("col_period_end_date") }}'
        tests:
          - not_null

      - name: period_end_date_key
        data_type: int64
        description: '{{ doc("col_period_end_date_key") }}'
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
              where: "is_period_complete"

      - name: cohort_size
        data_type: int64
        description: '{{ doc("col_cohort_size") }}'
        tests:
          - not_null

      - name: retained_count
        data_type: int64
        description: '{{ doc("col_retained_count") }}'
        tests:
          - not_null

      - name: retention_rate
        data_type: float64
        description: '{{ doc("col_retention_rate") }}'
        tests:
          - not_null

      - name: is_period_complete
        data_type: boolean
        description: '{{ doc("col_is_period_complete") }}'
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - cohort_week_start_date
              - retention_period
