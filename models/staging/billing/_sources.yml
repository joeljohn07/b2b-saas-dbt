version: 2

sources:
  - name: billing
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: raw_billing
    description: '{{ doc("src_billing") }}'
    tables:
      - name: subscriptions
        description: '{{ doc("src_billing_subscriptions") }}'
        config:
          loaded_at_field: _loaded_at
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 48
              period: hour
        columns:
          - name: subscription_event_id
            description: '{{ doc("col_subscription_event_id") }}'
          - name: _loaded_at
            description: '{{ doc("col__loaded_at") }}'

      - name: invoices
        description: '{{ doc("src_billing_invoices") }}'
        config:
          loaded_at_field: _loaded_at
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 48
              period: hour
        columns:
          - name: invoice_id
            description: '{{ doc("col_invoice_id") }}'
          - name: _loaded_at
            description: '{{ doc("col__loaded_at") }}'
