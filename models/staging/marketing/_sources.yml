version: 2

sources:
  - name: marketing
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: raw_marketing
    description: '{{ doc("src_marketing") }}'
    tables:
      - name: spend
        description: '{{ doc("src_marketing_spend") }}'
        config:
          loaded_at_field: _loaded_at
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 48
              period: hour
        columns:
          - name: spend_id
            description: '{{ doc("col_spend_id") }}'
          - name: _loaded_at
            description: '{{ doc("col__loaded_at") }}'
