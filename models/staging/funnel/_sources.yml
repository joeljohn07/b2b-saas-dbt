version: 2

sources:
  - name: funnel
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: raw_funnel
    description: '{{ doc("src_funnel") }}'
    tables:
      - name: events
        description: '{{ doc("src_funnel_events") }}'
        config:
          loaded_at_field: _loaded_at
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 48
              period: hour
        columns:
          - name: event_id
            description: '{{ doc("col_event_id") }}'
          - name: event_time
            description: '{{ doc("col_event_time") }}'
          - name: _loaded_at
            description: '{{ doc("col__loaded_at") }}'
