version: 2

sources:
  - name: support
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: raw_support
    description: '{{ doc("src_support") }}'
    tables:
      - name: tickets
        description: '{{ doc("src_support_tickets") }}'
        config:
          loaded_at_field: _loaded_at
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 48
              period: hour
        columns:
          - name: ticket_id
            description: '{{ doc("col_ticket_id") }}'
          - name: _loaded_at
            description: '{{ doc("col__loaded_at") }}'
