version: 2

models:
  - name: stg_support__tickets
    description: '{{ doc("stg_support__tickets") }}'
    config:
      contract:
        enforced: true
      tags:
        - staging
    columns:
      - name: ticket_id
        data_type: string
        description: '{{ doc("col_ticket_id") }}'
        data_tests:
          - unique
          - not_null

      - name: user_id
        data_type: string
        description: '{{ doc("col_user_id") }}'
        data_tests:
          - not_null

      - name: account_id
        data_type: string
        description: '{{ doc("col_account_id") }}'
        data_tests:
          - not_null

      - name: created_at
        data_type: timestamp
        description: '{{ doc("col_created_at") }}'
        data_tests:
          - not_null

      - name: resolved_at
        data_type: timestamp
        description: '{{ doc("col_resolved_at") }}'

      - name: _loaded_at
        data_type: timestamp
        description: '{{ doc("col__loaded_at") }}'
        data_tests:
          - not_null

      - name: category
        data_type: string
        description: '{{ doc("col_category") }}'
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - bug
                  - feature_request
                  - billing
                  - onboarding
                  - other

      - name: priority
        data_type: string
        description: '{{ doc("col_priority") }}'
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - low
                  - medium
                  - high
                  - critical

      - name: status
        data_type: string
        description: '{{ doc("col_ticket_status") }}'
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - open
                  - in_progress
                  - resolved
                  - closed

      - name: csat_score
        data_type: int64
        description: '{{ doc("col_csat_score") }}'
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 5
              config:
                where: csat_score is not null

      - name: first_response_seconds
        data_type: int64
        description: '{{ doc("col_first_response_seconds") }}'
