version: 2

models:
  - name: int_subscription_lifecycle
    description: '{{ doc("int_subscription_lifecycle") }}'
    config:
      tags:
        - intermediate
    columns:
      - name: subscription_event_id
        description: '{{ doc("col_subscription_event_id") }}'
        data_tests:
          - unique
          - not_null

      - name: subscription_id
        description: '{{ doc("col_subscription_id") }}'
        data_tests:
          - not_null

      - name: user_id
        description: '{{ doc("col_user_id") }}'
        data_tests:
          - not_null

      - name: account_id
        description: '{{ doc("col_account_id") }}'
        data_tests:
          - not_null

      - name: event_type
        description: '{{ doc("col_subscription_event_type") }}'
        data_tests:
          - not_null

      - name: event_time
        description: '{{ doc("col_event_time") }}'
        data_tests:
          - not_null

      - name: plan
        description: '{{ doc("col_plan") }}'
        data_tests:
          - not_null

      - name: previous_plan
        description: '{{ doc("col_previous_plan") }}'

      - name: billing_cycle
        description: '{{ doc("col_billing_cycle") }}'
        data_tests:
          - not_null

      - name: mrr_amount
        description: '{{ doc("col_mrr_amount") }}'
        data_tests:
          - not_null

      - name: currency
        description: '{{ doc("col_currency") }}'
        data_tests:
          - not_null

      - name: cancel_reason
        description: '{{ doc("col_cancel_reason") }}'

      - name: is_voluntary
        description: '{{ doc("col_is_voluntary") }}'

      - name: is_active
        description: '{{ doc("col_is_active") }}'
        data_tests:
          - not_null

      - name: days_since_previous_event
        description: '{{ doc("col_days_since_previous_event") }}'
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                where: "days_since_previous_event is not null"

  - name: int_mrr_movements
    description: '{{ doc("int_mrr_movements") }}'
    config:
      tags:
        - intermediate
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - account_id
              - subscription_event_id
    columns:
      - name: account_id
        description: '{{ doc("col_account_id") }}'
        data_tests:
          - not_null

      - name: subscription_event_id
        description: '{{ doc("col_subscription_event_id") }}'
        data_tests:
          - not_null

      - name: subscription_id
        description: '{{ doc("col_subscription_id") }}'
        data_tests:
          - not_null

      - name: movement_date
        description: '{{ doc("col_movement_date") }}'
        data_tests:
          - not_null

      - name: movement_type
        description: '{{ doc("col_movement_type") }}'
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - new
                  - expansion
                  - contraction
                  - churn
                  - reactivation

      - name: mrr_before
        description: '{{ doc("col_mrr_before") }}'
        data_tests:
          - not_null

      - name: mrr_after
        description: '{{ doc("col_mrr_after") }}'
        data_tests:
          - not_null

      - name: mrr_delta
        description: '{{ doc("col_mrr_delta") }}'
        data_tests:
          - not_null
