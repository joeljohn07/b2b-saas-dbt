version: 2

models:
  - name: int_ticket_metrics
    description: '{{ doc("int_ticket_metrics") }}'
    config:
      tags:
        - intermediate
    columns:
      - name: ticket_id
        description: '{{ doc("col_ticket_id") }}'
        tests:
          - unique
          - not_null

      - name: user_id
        description: '{{ doc("col_user_id") }}'
        tests:
          - not_null

      - name: account_id
        description: '{{ doc("col_account_id") }}'
        tests:
          - not_null

      - name: created_at
        description: '{{ doc("col_created_at") }}'
        tests:
          - not_null

      - name: resolved_at
        description: '{{ doc("col_resolved_at") }}'

      - name: category
        description: '{{ doc("col_category") }}'
        tests:
          - not_null

      - name: priority
        description: '{{ doc("col_priority") }}'
        tests:
          - not_null

      - name: status
        description: '{{ doc("col_ticket_status") }}'
        tests:
          - not_null

      - name: csat_score
        description: '{{ doc("col_csat_score") }}'

      - name: resolution_time_hours
        description: '{{ doc("col_resolution_time_hours") }}'
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              config:
                where: "resolution_time_hours is not null"

      - name: first_response_hours
        description: '{{ doc("col_first_response_hours") }}'
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              config:
                where: "first_response_hours is not null"

      - name: is_resolved
        description: '{{ doc("col_is_resolved") }}'
        tests:
          - not_null

  - name: int_invoices_prep
    description: '{{ doc("int_invoices_prep") }}'
    config:
      tags:
        - intermediate
    columns:
      - name: invoice_id
        description: '{{ doc("col_invoice_id") }}'
        tests:
          - unique
          - not_null

      - name: subscription_id
        description: '{{ doc("col_subscription_id") }}'
        tests:
          - not_null

      - name: user_id
        description: '{{ doc("col_user_id") }}'
        tests:
          - not_null

      - name: account_id
        description: '{{ doc("col_account_id") }}'
        tests:
          - not_null

      - name: issued_at
        description: '{{ doc("col_issued_at") }}'
        tests:
          - not_null

      - name: paid_at
        description: '{{ doc("col_paid_at") }}'

      - name: _loaded_at
        description: '{{ doc("col__loaded_at") }}'
        tests:
          - not_null

      - name: amount
        description: '{{ doc("col_amount") }}'
        tests:
          - not_null

      - name: currency
        description: '{{ doc("col_currency") }}'
        tests:
          - not_null

      - name: status
        description: '{{ doc("col_invoice_status") }}'
        tests:
          - not_null

      - name: refund_amount
        description: '{{ doc("col_refund_amount") }}'
        tests:
          - not_null

      - name: line_items
        description: '{{ doc("col_line_items") }}'

      - name: is_paid
        description: '{{ doc("col_is_paid") }}'
        tests:
          - not_null

      - name: net_amount
        description: '{{ doc("col_net_amount") }}'
        tests:
          - not_null

  - name: int_marketing_spend_prep
    description: '{{ doc("int_marketing_spend_prep") }}'
    config:
      tags:
        - intermediate
    columns:
      - name: spend_id
        description: '{{ doc("col_spend_id") }}'
        tests:
          - unique
          - not_null

      - name: spend_date
        description: '{{ doc("col_spend_date") }}'
        tests:
          - not_null

      - name: channel
        description: '{{ doc("col_channel") }}'
        tests:
          - not_null

      - name: campaign_id
        description: '{{ doc("col_campaign_id") }}'
        tests:
          - not_null

      - name: campaign_name
        description: '{{ doc("col_campaign_name") }}'

      - name: impressions
        description: '{{ doc("col_impressions") }}'

      - name: clicks
        description: '{{ doc("col_clicks") }}'

      - name: spend_amount
        description: '{{ doc("col_spend_amount") }}'
        tests:
          - not_null

      - name: currency
        description: '{{ doc("col_currency") }}'
        tests:
          - not_null

      - name: _loaded_at
        description: '{{ doc("col__loaded_at") }}'
        tests:
          - not_null

  - name: int_attribution
    description: '{{ doc("int_attribution") }}'
    config:
      tags:
        - intermediate
    columns:
      - name: user_id
        description: '{{ doc("col_user_id") }}'
        tests:
          - unique
          - not_null

      - name: first_touch_channel
        description: '{{ doc("col_first_touch_channel") }}'
        tests:
          - not_null:
              config:
                where: "activation_at is not null"

      - name: first_touch_source
        description: '{{ doc("col_first_touch_source") }}'

      - name: first_touch_medium
        description: '{{ doc("col_first_touch_medium") }}'

      - name: first_touch_campaign
        description: '{{ doc("col_first_touch_campaign") }}'

      - name: first_touch_at
        description: '{{ doc("col_first_touch_at") }}'
        tests:
          - not_null

      - name: last_touch_channel
        description: '{{ doc("col_last_touch_channel") }}'
        tests:
          - not_null

      - name: last_touch_source
        description: '{{ doc("col_last_touch_source") }}'

      - name: last_touch_medium
        description: '{{ doc("col_last_touch_medium") }}'

      - name: last_touch_campaign
        description: '{{ doc("col_last_touch_campaign") }}'

      - name: last_touch_at
        description: '{{ doc("col_last_touch_at") }}'
        tests:
          - not_null

      - name: activation_at
        description: '{{ doc("col_activation_at") }}'
        tests:
          - not_null

  - name: int_checkout_conversion
    description: '{{ doc("int_checkout_conversion") }}'
    config:
      tags:
        - intermediate
    columns:
      - name: checkout_event_id
        description: '{{ doc("col_checkout_event_id") }}'
        tests:
          - unique
          - not_null

      - name: user_id
        description: '{{ doc("col_user_id") }}'
        tests:
          - not_null

      - name: account_id
        description: '{{ doc("col_account_id") }}'

      - name: checkout_at
        description: '{{ doc("col_checkout_at") }}'
        tests:
          - not_null

      - name: target_plan
        description: '{{ doc("col_target_plan") }}'

      - name: subscription_event_id
        description: '{{ doc("col_subscription_event_id") }}'

      - name: subscription_at
        description: '{{ doc("col_subscription_at") }}'

      - name: converted
        description: '{{ doc("col_converted") }}'
        tests:
          - not_null

      - name: time_to_conversion_days
        description: '{{ doc("col_time_to_conversion_days") }}'
        tests:
          - dbt_utils.expression_is_true:
              expression: "<= 30 or time_to_conversion_days is null"

  - name: int_account_health
    description: '{{ doc("int_account_health") }}'
    config:
      tags:
        - intermediate
    columns:
      - name: account_id
        description: '{{ doc("col_account_id") }}'
        tests:
          - unique
          - not_null

      - name: health_score
        description: '{{ doc("col_health_score") }}'
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: activity_score
        description: '{{ doc("col_activity_score") }}'
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: billing_score
        description: '{{ doc("col_billing_score") }}'
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: support_score
        description: '{{ doc("col_support_score") }}'
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: calculated_at
        description: '{{ doc("col_calculated_at") }}'
        tests:
          - not_null

      - name: trailing_window_days
        description: '{{ doc("col_trailing_window_days") }}'
        tests:
          - not_null
