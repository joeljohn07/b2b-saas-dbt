version: 2

models:
  - name: int_engagement_states
    description: '{{ doc("int_engagement_states") }}'
    config:
      tags:
        - intermediate
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - user_id
              - snapshot_week_start
    columns:
      - name: user_id
        description: '{{ doc("col_user_id") }}'
        data_tests:
          - not_null

      - name: snapshot_week_start
        description: '{{ doc("col_snapshot_week_start") }}'
        data_tests:
          - not_null

      - name: engagement_state
        description: '{{ doc("col_engagement_state") }}'
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - pre_active
                  - active
                  - dormant
                  - disengaged

      - name: is_re_engaged
        description: '{{ doc("col_is_re_engaged") }}'
        data_tests:
          - not_null

      - name: days_since_last_activity
        description: '{{ doc("col_days_since_last_activity") }}'

      - name: last_activity_at
        description: '{{ doc("col_last_activity_at") }}'

  - name: int_experiment_results
    description: '{{ doc("int_experiment_results") }}'
    config:
      tags:
        - intermediate
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - user_id
              - experiment_id
    columns:
      - name: user_id
        description: '{{ doc("col_user_id") }}'
        data_tests:
          - not_null

      - name: experiment_id
        description: '{{ doc("col_experiment_id") }}'
        data_tests:
          - not_null

      - name: variant
        description: '{{ doc("col_variant") }}'
        data_tests:
          - not_null

      - name: first_exposure_at
        description: '{{ doc("col_first_exposure_at") }}'
        data_tests:
          - not_null

      - name: converted
        description: '{{ doc("col_converted") }}'
        data_tests:
          - not_null

      - name: conversion_at
        description: '{{ doc("col_conversion_at") }}'

      - name: exposure_duration_hours
        description: '{{ doc("col_exposure_duration_hours") }}'
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 24

  - name: int_experiment_metadata
    description: '{{ doc("int_experiment_metadata") }}'
    config:
      tags:
        - intermediate
    columns:
      - name: experiment_id
        description: '{{ doc("col_experiment_id") }}'
        data_tests:
          - unique
          - not_null

      - name: experiment_name
        description: '{{ doc("col_experiment_name") }}'
        data_tests:
          - not_null

      - name: status
        description: '{{ doc("col_experiment_status") }}'
        data_tests:
          - not_null

      - name: start_date
        description: '{{ doc("col_experiment_start_date") }}'
        data_tests:
          - not_null

      - name: end_date
        description: '{{ doc("col_experiment_end_date") }}'

      - name: description
        description: '{{ doc("col_experiment_description") }}'
