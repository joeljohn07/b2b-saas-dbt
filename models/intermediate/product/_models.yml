version: 2

models:
  - name: int_events_normalized
    description: '{{ doc("int_events_normalized") }}'
    config:
      materialized: incremental
      unique_key: event_id
      partition_by:
        field: event_date
        data_type: date
        granularity: day
      incremental_strategy: merge
      on_schema_change: fail
      tags:
        - intermediate
        - incremental
    columns:
      - name: event_id
        description: '{{ doc("col_event_id") }}'
        tests:
          - unique
          - not_null

      - name: user_id
        description: '{{ doc("col_user_id") }}'

      - name: anon_id
        description: '{{ doc("col_anon_id") }}'
        tests:
          - not_null

      - name: account_id
        description: '{{ doc("col_account_id") }}'

      - name: event_time
        description: '{{ doc("col_event_time") }}'
        tests:
          - not_null

      - name: ingest_time
        description: '{{ doc("col_ingest_time") }}'

      - name: _loaded_at
        description: '{{ doc("col__loaded_at") }}'
        tests:
          - not_null

      - name: event_date
        description: '{{ doc("col_event_date") }}'
        tests:
          - not_null

      - name: event_type
        description: '{{ doc("col_event_type") }}'
        tests:
          - not_null

      - name: platform
        description: '{{ doc("col_platform") }}'

      - name: channel
        description: '{{ doc("col_channel") }}'

      - name: plan_context
        description: '{{ doc("col_plan_context") }}'

      - name: utm_source
        description: '{{ doc("col_utm_source") }}'

      - name: utm_medium
        description: '{{ doc("col_utm_medium") }}'

      - name: utm_campaign
        description: '{{ doc("col_utm_campaign") }}'

      - name: utm_term
        description: '{{ doc("col_utm_term") }}'

      - name: utm_content
        description: '{{ doc("col_utm_content") }}'

      - name: device_type
        description: '{{ doc("col_device_type") }}'

      - name: browser
        description: '{{ doc("col_browser") }}'

      - name: os
        description: '{{ doc("col_os") }}'

      - name: user_agent
        description: '{{ doc("col_user_agent") }}'

      - name: page_url
        description: '{{ doc("col_page_url") }}'

      - name: referrer
        description: '{{ doc("col_referrer") }}'

      - name: signup_method
        description: '{{ doc("col_signup_method") }}'

      - name: activation_action
        description: '{{ doc("col_activation_action") }}'

      - name: time_to_activate_hours
        description: '{{ doc("col_time_to_activate_hours") }}'

      - name: feature_name
        description: '{{ doc("col_feature_name") }}'

      - name: feature_duration_seconds
        description: '{{ doc("col_feature_duration_seconds") }}'

      - name: source_page
        description: '{{ doc("col_source_page") }}'

      - name: target_plan
        description: '{{ doc("col_target_plan") }}'

      - name: billing_cycle
        description: '{{ doc("col_billing_cycle") }}'

      - name: member_role
        description: '{{ doc("col_member_role") }}'

      - name: member_reason
        description: '{{ doc("col_member_reason") }}'

      - name: experiment_flags
        description: '{{ doc("col_experiment_flags") }}'

  - name: int_identity_stitched
    description: '{{ doc("int_identity_stitched") }}'
    config:
      tags:
        - intermediate
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - anon_id
              - valid_from
    columns:
      - name: anon_id
        description: '{{ doc("col_anon_id") }}'
        tests:
          - not_null

      - name: user_id
        description: '{{ doc("col_user_id") }}'
        tests:
          - not_null

      - name: valid_from
        description: '{{ doc("col_valid_from") }}'
        tests:
          - not_null

      - name: valid_to
        description: '{{ doc("col_valid_to") }}'

      - name: stitch_source
        description: '{{ doc("col_stitch_source") }}'
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - last_touch
                  - historical

  - name: int_account_memberships
    description: '{{ doc("int_account_memberships") }}'
    config:
      tags:
        - intermediate
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - user_id
              - account_id
              - valid_from
    columns:
      - name: user_id
        description: '{{ doc("col_user_id") }}'
        tests:
          - not_null

      - name: account_id
        description: '{{ doc("col_account_id") }}'
        tests:
          - not_null

      - name: role
        description: '{{ doc("col_member_role") }}'

      - name: valid_from
        description: '{{ doc("col_valid_from") }}'
        tests:
          - not_null

      - name: valid_to
        description: '{{ doc("col_valid_to") }}'

      - name: membership_duration_days
        description: '{{ doc("col_membership_duration_days") }}'
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

  - name: int_sessions
    description: '{{ doc("int_sessions") }}'
    config:
      tags:
        - intermediate
    columns:
      - name: session_id
        description: '{{ doc("col_session_id") }}'
        tests:
          - unique
          - not_null

      - name: anon_id
        description: '{{ doc("col_anon_id") }}'
        tests:
          - not_null

      - name: stitched_user_id
        description: '{{ doc("col_stitched_user_id") }}'

      - name: session_start_at
        description: '{{ doc("col_session_start_at") }}'
        tests:
          - not_null

      - name: session_end_at
        description: '{{ doc("col_session_end_at") }}'
        tests:
          - not_null

      - name: session_duration_seconds
        description: '{{ doc("col_session_duration_seconds") }}'
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

      - name: event_count
        description: '{{ doc("col_event_count") }}'
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1

      - name: page_view_count
        description: '{{ doc("col_page_view_count") }}'

      - name: utm_source
        description: '{{ doc("col_utm_source") }}'

      - name: utm_medium
        description: '{{ doc("col_utm_medium") }}'

      - name: utm_campaign
        description: '{{ doc("col_utm_campaign") }}'

      - name: platform
        description: '{{ doc("col_platform") }}'

      - name: device_type
        description: '{{ doc("col_device_type") }}'

      - name: browser
        description: '{{ doc("col_browser") }}'

      - name: session_date
        description: '{{ doc("col_session_date") }}'
        tests:
          - not_null

  - name: int_funnel_staged
    description: '{{ doc("int_funnel_staged") }}'
    config:
      tags:
        - intermediate
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - user_id
              - stage
    columns:
      - name: user_id
        description: '{{ doc("col_user_id") }}'
        tests:
          - not_null

      - name: stage
        description: '{{ doc("col_stage") }}'
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - page_view
                  - signup
                  - activation
                  - feature_use
                  - checkout_start

      - name: stage_reached_at
        description: '{{ doc("col_stage_reached_at") }}'
        tests:
          - not_null

      - name: is_current_stage
        description: '{{ doc("col_is_current_stage") }}'
        tests:
          - not_null
